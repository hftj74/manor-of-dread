/* ===== JUMPSCARE OVERLAY ===== */
#jsOverlay{
  display:none;position:fixed;top:0;left:0;width:100%;height:100%;

#jsOverlay.active{display:flex;}

/* ===== FLOATING CLOSET ===== */
.closet{
  position:fixed;font-size:52px;pointer-events:none;z-index:9100;
  animation:floatCloset linear infinite;
  user-select:none;filter:drop-shadow(0 0 12px #ff00ff);
}
@keyframes floatCloset{
  0%  {transform:translate(0,0) rotate(-5deg)}
  20% {transform:translate(30px,-40px) rotate(10deg)}
  40% {transform:translate(-20px,-80px) rotate(-8deg)}
  60% {transform:translate(40px,-120px) rotate(12deg)}
  80% {transform:translate(-10px,-60px) rotate(-6deg)}
  100%{transform:translate(0,-150px) rotate(5deg);opacity:0}
}

var jsActive = false;
var jsTimer = null;
var jsCallback = null;
var mewCount = 0;

function spawnClosets(count) {
  for(var i = 0; i < count; i++) {
    (function(idx) {
      setTimeout(function() {
        var c = document.createElement("div");
        c.className = "closet";
        c.textContent = "🚪";
        var startX = 20 + Math.random() * 60; // % across screen
        var dur = 1.2 + Math.random() * 0.8;
        c.style.left = startX + "%";
        c.style.bottom = "10%";
        c.style.animationDuration = dur + "s";
        c.style.animationDelay = "0s";
        document.body.appendChild(c);
        setTimeout(function() { c.remove(); }, dur * 1000 + 100);
      }, idx * 180);
    })(i);
  }
}

function triggerScare(callback) {
  if(jsActive) { if(callback) callback(); return; }
  var s = SCARES[Math.floor(Math.random() * SCARES.length)];
  jsActive = true;
  jsCallback = callback || null;
  mewCount++;
  if(SAVE) { SAVE.mewCount = (SAVE.mewCount||0)+1; save(); }

  document.getElementById("jsCat").textContent = s.cat;
  document.getElementById("jsHead").textContent = s.head;
  document.getElementById("jsSub").textContent = s.sub;
  document.getElementById("jsMeme").textContent = s.meme;
  document.getElementById("jsOverlay").classList.add("active");

  spawnClosets(s.closets);

  if(jsTimer) clearTimeout(jsTimer);
  jsTimer = setTimeout(dismissScare, 2200);

  return s.fright;
}

function dismissScare() {
  if(!jsActive) return;
  if(jsTimer) clearTimeout(jsTimer);
  jsActive = false;
  document.getElementById("jsOverlay").classList.remove("active");
  if(jsCallback) { var cb = jsCallback; jsCallback = null; cb(); }
}

document.getElementById("jsOverlay").addEventListener("click", dismissScare);

async function genEndings(){
  if(genRunning)return;
  if(SAVE.gen&&SAVE.gen.length>0){
    var ids={};for(var i=0;i<CORE.length;i++){ids[CORE[i].id]=1;}
    ALL=CORE.slice();
    for(var i=0;i<SAVE.gen.length;i++){if(!ids[SAVE.gen[i].id])ALL.push(SAVE.gen[i]);}
    ready=true;if(screen==="menu")render();return;
  }
  genRunning=true;
  var taken=[];for(var i=0;i<CORE.length;i++){taken.push(CORE[i].id);}
  try{
    var res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:7000,messages:[{role:"user",content:"Design 67 more endings for horror game Manor of Dread. Players explore a manor collect items (torch lantern crucifix knife iron_key journal salt amulet vial rope) manage HP and sanity fight The Cellar Beast (weak: torch) or Attic Wraith (weak: crucifix/salt). Characters: dogs Noel (nursery) and Rudy (cellar) survivors Dan (study) and Lily (ballroom). Also there is a Sigma Cat that randomly jumpscares the player with mewing memes and floating closets. IDs already used: "+taken.join(",")+". Make exactly 67 endings as a valid JSON array. Each object must have: id (unique snake_case) l (name 2-4 words) cat (victory/escape/death/madness/secret/cursed/neutral) i (single ASCII char) cond (under 12 words) desc (1-2 atmospheric sentences). Vary categories. Return ONLY the raw JSON array nothing else."}]})
    });
    var data=await res.json();
    var txt="";for(var i=0;i<data.content.length;i++){if(data.content[i].type==="text")txt+=data.content[i].text;}
    var match=txt.match(/\[[\s\S]*\]/);
    if(match){
      var parsed=JSON.parse(match[0]);
      var ids={};for(var i=0;i<CORE.length;i++){ids[CORE[i].id]=1;}
      SAVE.gen=[];
      for(var i=0;i<parsed.length;i++){
        if(parsed[i].id&&parsed[i].l&&parsed[i].cat&&parsed[i].desc&&!ids[parsed[i].id]){
          SAVE.gen.push(parsed[i]);if(SAVE.gen.length>=67)break;
        }
      }
      ALL=CORE.slice();for(var i=0;i<SAVE.gen.length;i++){ALL.push(SAVE.gen[i]);}
      save();
    }
    ready=true;
  }catch(e){ready=true;}
  genRunning=false;
  if(screen==="menu")render();
}

function trigEv(id){
  var e=EVS[id];if(!e)return;
  if(e.mew){
    // Mewing cat event — trigger jumpscare then apply fright after
    SAVE.mewCount=(SAVE.mewCount||0)+1;save();
    var fright=triggerScare(function(){
      G.sanity=Math.max(0,G.sanity-20);
      addLog("The sigma cat appeared. You lost 20 sanity. No cap.","le-cat");
      SAVE.unlocked["sigma_scare"]=1;save();
      checkAchievements();
      if(G.sanity<=0){addLog("Your mind shatters from the mewing.","le-bad");endGame("insanity");}
      else render();
    });
    return;
  }
  if(e.d)G.hp=Math.max(0,G.hp-e.d);
  if(e.f)G.sanity=Math.max(0,G.sanity-e.f);
  if(e.clue)G.clue=1;
  addLog(e.t,e.d||e.f>12?"le-bad":"le-warn");
}

function checkSpecial(base){
  var win=base==="slay_beast"||base==="slay_wraith";
  if(win){
    if(G.dogs.indexOf("noel")>=0&&G.dogs.indexOf("rudy")>=0&&G.hp>=100)showAchievement("a_dog_survivor");
    if(G.hp>=100)return "full_hp";
    if(G.sanity>=100){showAchievement("a_sanity_steel");return "full_sanity";}
    if(G.hp<5)showAchievement("a_survived_low");
    if(G.hp<10)return "low_hp";
    if(G.items.indexOf("torch")>=0&&G.items.indexOf("crucifix")>=0)return "both_items";
    if(G.items.indexOf("lantern")>=0)return "lantern_win";
    if(G.items.indexOf("journal")>=0)return "journal_win";
    var ri=[];for(var i=0;i<G.items.length;i++){if(["noel","rudy","dan","lily"].indexOf(G.items[i])<0)ri.push(G.items[i]);}
    if(ri.length>=8)return "collector";
    if(Object.keys(G.visited).length>=ROOMS.length)return "explorer";
    if(G.moves<=14)return "speed_run";
    if(base==="slay_beast"&&G.moves<=5)return "speed_cellar";
    if(ri.length===1&&ri[0]==="knife")return "knife_only";
  }
  return base;
}

      (function(w){
        if(G.items.indexOf(w)>=0)ch.push({t:"Use "+ITEMS[w].n+" against "+boss.n,c:"btn-purple",a:function(){fightBoss(w);}});
      })(boss.weak[wi]);
    }
    if(real.length===0&&!hasN&&!hasR&&!hasDan&&!hasLily)
      ch.push({t:"Fight bare-handed (no items!)",c:"btn-danger",a:function(){addLog("You charge with nothing but desperation.","le-bad");endGame("no_items");}});
    else ch.push({t:"Fight bare-handed",c:"btn-danger",a:function(){fightBoss(null);}});
    ch.push({t:"Run! Back the way you came",c:"",a:function(){moveTo(r.ex[0]);}});
  }
  // Salt
  if(G.items.indexOf("salt")>=0&&!G.saltUsed)ch.push({t:"Pour a salt circle",c:"btn-green",a:function(){
    var inBoss=rm(G.current).boss&&G.current===G.boss;
    G.saltUsed=1;G.sanity=Math.min(100,G.sanity+15);
    G.items=G.items.filter(function(i){return i!=="salt";});
    if(inBoss){endGame("salt_boss");return;}
    addLog("You pour a salt circle. The air calms. (+15 sanity)","le-good");render();
  }});
  // Vial
  if(G.items.indexOf("vial")>=0)ch.push({t:"Drink the vial",c:"btn-purple",a:function(){
    G.items=G.items.filter(function(i){return i!=="vial";});
    if(Math.random()<.5){G.hp=Math.min(100,G.hp+30);addLog("The liquid heals you. (+30 HP)","le-good");}
    else{G.hp=Math.max(0,G.hp-20);addLog("Poison! (-20 HP)","le-bad");if(G.hp<=0){endGame("poison");return;}}
    render();
  }});
  // Dan secret
  if(G.people.indexOf("dan")>=0&&G.items.indexOf("journal")>=0&&!SAVE.unlocked["dan_secret"])
    ch.push({t:"Show Dan the journal",c:"btn-dan",a:function(){addLog("Dan goes very quiet. I wrote that he says.","le-dan");endGame("dan_secret");}});
  // Lily secret
  if(G.people.indexOf("lily")>=0&&G.items.indexOf("lantern")>=0&&!SAVE.unlocked["lily_secret"]&&G.current==="ballroom")
    ch.push({t:"Hold the lantern to Lily's face",c:"btn-lily",a:function(){addLog("The light catches her face. She smiles not with relief.","le-lily");endGame("lily_secret");}});
  return ch;
}

function moveTo(dest){
  var d=rm(dest);if(!d)return;
  G.current=dest;G.moves++;
  var isNew=!G.visited[dest];
  G.visited[dest]=1;
  if(isNew){
    if(d.ev&&d.ev.length){
      var evId=d.ev[Math.floor(Math.random()*d.ev.length)];
      trigEv(evId);
    }
    if(d.dog&&G.dogs.indexOf(d.dog)<0)addLog("You hear a dog - "+(d.dog==="noel"?"Noel":"Rudy")+" is in this room!","le-dog");
    if(d.person&&G.people.indexOf(d.person)<0)addLog("Someone is hiding here - "+(d.person==="dan"?"Dan":"Lily")+"!",d.person==="dan"?"le-dan":"le-lily");
    // Random mewing on new room
    maybeMew(function(){
      checkAchievements();
      if(G.hp<=0)endGame("death_hp");
      else if(G.sanity<=0){addLog("Your mind shatters.","le-bad");endGame("insanity");}
      else render();
    });
    return;
  }
  checkAchievements();
  if(G.hp<=0)endGame("death_hp");
  else if(G.sanity<=0){addLog("Your mind shatters.","le-bad");endGame("insanity");}
  else render();
}

function fightBoss(weapon){
  var bk=G.current==="cellar"?"cellar":"attic";
  var boss=BOSSES[bk];G.moves++;
  if(weapon&&boss.weak.indexOf(weapon)>=0){
    G.items=G.items.filter(function(i){return i!==weapon;});
    addLog(boss.win,"le-good");
    showAchievement("a_first_win");
    endGame(bk==="cellar"?"slay_beast":"slay_wraith");
  } else {
    var atk=boss.atk[Math.floor(Math.random()*boss.atk.length)];
    if(G.items.indexOf("amulet")>=0&&G.hp-atk.d<=0){
      G.items=G.items.filter(function(i){return i!=="amulet";});
      addLog("The amulet SHATTERS - absorbed a fatal blow!","le-good");
      G.sanity=Math.max(0,G.sanity-10);addLog(atk.t,"le-bad");
      if(G.sanity<=0){endGame("insanity");return;}
      endGame("amulet_used");return;
    }
    G.hp=Math.max(0,G.hp-atk.d);G.sanity=Math.max(0,G.sanity-10);
    addLog(atk.t,"le-bad");
    if(G.hp<=0){addLog(boss.lose,"le-bad");endGame("death_hp");}
    else if(G.sanity<=0){addLog("Your mind breaks.","le-bad");endGame("insanity");}
    else render();
  }
}

function endGame(raw){
  var fid=SKIP_IDS[raw]?raw:(checkSpecial(raw)||raw);
  G.end=fid;SAVE.unlocked[fid]=1;save();
  checkAchievements();
  screen="ending";render();
}

function buildMap(){
  var html='<div class="mgrid">';
  for(var i=0;i<ROOMS.length;i++){
    var r=ROOMS[i];
    var v=G.visited[r.id],cur=G.current===r.id;
    var dogHere=r.dog&&v&&G.dogs.indexOf(r.dog)<0;
    var danHere=r.person==="dan"&&v&&G.people.indexOf("dan")<0;
    var lilyHere=r.person==="lily"&&v&&G.people.indexOf("lily")<0;
    var cls=cur?"cur":danHere?"danr":lilyHere?"lilyr":dogHere?"dogr":v?"vis":r.safe?"saf":"unk";
    var tip=cur?r.n:v?r.n+(dogHere?" - dog!":danHere?" - Dan!":lilyHere?" - Lily!":""):"???";
    html+='<div class="rc '+cls+'" title="'+tip+'">'+(cur?"[*]":r.ic)+'</div>';
  }
  return html+'</div>';
}

function catRow(e){
  var got=SAVE.unlocked[e.id];
  var isDog=e.cat==="dog",isDan=e.cat==="dan",isLily=e.cat==="lily",isSig=e.cat==="sigma";
  var isSec=e.cat==="secret"&&!got;
  var eiC=got?(isDog?"ei ei-dog":isDan?"ei ei-dan":isLily?"ei ei-lily":"ei"):"ei ei-lock";
  var enC=got?(isDog?"en en-dog":isDan?"en en-dan":isLily?"en en-lily":"en"):"en en-lock";
  var ebC=got?(isDog?"eb eb-dog":isDan?"eb eb-dan":isLily?"eb eb-lily":"eb"):"eb eb-lock";
  return '<div class="er"><div class="'+eiC+'">'+(got?e.i:"?")+'</div><div style="flex:1;min-width:0"><div class="'+enC+'">'+(isSec?"???":e.l)+'</div><div class="'+(got?"ed":"ed ed-lock")+'">'+(got?e.cond:isSec?"Keep exploring...":e.cond)+'</div></div><span class="'+ebC+'">'+(got?"found":"locked")+'</span></div>';
}

function renderMenu(){
  var tot=ALL.length,unl=Object.keys(SAVE.unlocked).length,rem=tot-unl,pct=Math.round(unl/tot*100);
  var achUnl=Object.keys(SAVE.achievements).length,achTot=ACHIEVEMENTS.length;
  var cc={};for(var i=0;i<ALL.length;i++){cc[ALL[i].cat]=(cc[ALL[i].cat]||0)+1;}
  var filt=jf==="achievements"?null:jf==="all"?ALL:ALL.filter(function(e){return e.cat===jf;});
  var fhtml='<div class="cfilter"><div class="cf '+(jf==="all"?"cf-active":"")+'" onclick="jf=\'all\';render()">All ('+tot+')</div>';
  for(var i=0;i<CATS_DATA.length;i++){
    var c=CATS_DATA[i];
    fhtml+='<div class="cf '+(jf===c.id?"cf-active":"")+'" onclick="jf=\''+c.id+'\';render()">'+c.l+(cc[c.id]?" ("+cc[c.id]+")":"")+'</div>';
  }
  fhtml+='<div class="cf '+(jf==="achievements"?"cf-active":"")+'" onclick="jf=\'achievements\';render()">Achievements ('+achTot+')</div></div>';
  var rows="";
  if(jf==="achievements"){
    for(var i=0;i<ACHIEVEMENTS.length;i++){
      var a=ACHIEVEMENTS[i];var got=SAVE.achievements[a.id];var hidden=a.secret&&!got;
      rows+='<div class="er"><div class="'+(got?"ei ei-achiev":"ei ei-achiev-lock")+'">'+(got?a.icon:"?")+'</div><div style="flex:1;min-width:0"><div class="'+(got?"en en-achiev":"en en-lock")+'">'+(hidden?"???":a.l)+'</div><div class="'+(got?"ed":"ed ed-lock")+'">'+(hidden?"Keep exploring...":a.desc)+'</div></div><span class="'+(got?"eb eb-achiev":"eb eb-lock")+'">'+(got?"unlocked":"locked")+'</span></div>';
    }
  } else {for(var i=0;i<(filt||[]).length;i++){rows+=catRow(filt[i]);}}
  return '<div class="title">Manor of Dread</div>'+
    '<div class="subtitle">a haunted survival game &mdash; '+tot+' endings</div>'+
    '<div class="castline"><span style="color:#4080C0">Noel <span class="wag">~</span> &nbsp; Rudy <span class="wag" style="animation-delay:.2s">~</span></span>&nbsp;&nbsp;&nbsp;<span style="color:#20906a">Dan</span>&nbsp;&nbsp;<span style="color:#C04070">Lily</span>&nbsp;&nbsp;<span style="color:#ff69b4">😼 Sigma Cat</span></div>'+
    '<button class="btn btn-prim" onclick="newGame()">Enter the manor</button>'+
    (SAVE.runs>0?'<p style="font-size:11px;color:#9a8060;margin-bottom:10px">total runs: '+SAVE.runs+' &nbsp;|&nbsp; mewing scares: '+(SAVE.mewCount||0)+'</p>':"")+
    '<div class="dc"><div style="display:flex;gap:12px">'+
    '<div style="flex:1"><div class="rl">endings</div><div style="display:flex;align-items:baseline;gap:6px;margin:4px 0 2px"><span style="font-size:20px;font-weight:bold;color:#EF9F27">'+unl+'</span><span style="font-size:12px;color:#9a8060">/ '+tot+'</span></div><div class="pw"><div class="pi" style="width:'+pct+'%"></div></div></div>'+
    '<div style="flex:1"><div class="rl">achievements</div><div style="display:flex;align-items:baseline;gap:6px;margin:4px 0 2px"><span style="font-size:20px;font-weight:bold;color:#AFA9EC">'+achUnl+'</span><span style="font-size:12px;color:#9a8060">/ '+achTot+'</span></div><div class="pw"><div class="pi" style="width:'+Math.round(achUnl/achTot*100)+'%;background:#604890"></div></div></div>'+
    '</div><div style="font-size:12px;color:#9a8060;margin-top:8px">'+(rem>0?rem+' ending'+(rem>1?"s":"")+" still to find.":"All endings found. The manor has no more secrets.")+'</div></div>'+
    '<div class="dc"><div class="rl" style="margin-bottom:8px">journal &amp; achievements</div>'+
    (!ready?'<div style="font-size:13px;color:#9a8060;padding:8px 0"><span class="spin"></span>Generating more endings from the dark...</div>':fhtml)+
    '<div class="jscroll">'+rows+'</div></div>';
}

function renderEnding(){
  var e=null;for(var i=0;i<ALL.length;i++){if(ALL[i].id===G.end){e=ALL[i];break;}}
  if(!e){screen="menu";render();return;}
  var cat=catSt(e.cat),tot=ALL.length,unl=Object.keys(SAVE.unlocked).length,achUnl=Object.keys(SAVE.achievements).length;
  var survivors=[];
  if(G.people.indexOf("dan")>=0)survivors.push("Dan made it out.");
  if(G.people.indexOf("lily")>=0)survivors.push("Lily made it out.");
  if(G.dogs.indexOf("noel")>=0)survivors.push("Noel made it out. Good boy.");
  if(G.dogs.indexOf("rudy")>=0)survivors.push("Rudy made it out. Absolute unit.");
  return '<div class="ecard" style="background:'+cat.bg+';border:1px solid '+cat.b+'">'+
    '<span class="catb" style="background:'+cat.bg+';border:1px solid '+cat.b+';color:'+cat.c+'">'+cat.l+'</span>'+
    '<div style="font-size:18px;font-weight:bold;color:'+cat.c+';margin-bottom:8px">'+e.l+'</div>'+
    '<div style="font-size:13px;line-height:1.9;color:#e8d5b0">'+e.desc+'</div>'+
    (survivors.length?'<div style="margin-top:10px;font-size:12px;color:#9a8060;line-height:1.8">'+survivors.join("<br>")+'</div>':"")+
    '<div style="margin-top:12px;display:flex;gap:16px;flex-wrap:wrap">'+
    '<div><div class="sl">health</div><div style="font-size:15px;font-weight:bold;color:#f0e0c0">'+Math.round(G.hp)+'%</div></div>'+
    '<div><div class="sl">sanity</div><div style="font-size:15px;font-weight:bold;color:#f0e0c0">'+Math.round(G.sanity)+'%</div></div>'+
    '<div><div class="sl">moves</div><div style="font-size:15px;font-weight:bold;color:#f0e0c0">'+G.moves+'</div></div>'+
    '<div><div class="sl">scares</div><div style="font-size:15px;font-weight:bold;color:#ff69b4">'+(SAVE.mewCount||0)+'x 😼</div></div>'+
    '</div></div>'+
    '<div class="dc"><div style="display:flex;gap:12px">'+
    '<div style="flex:1"><div class="rl">endings</div><div style="display:flex;align-items:baseline;gap:6px;margin:3px 0"><span style="font-size:18px;font-weight:bold;color:#EF9F27">'+unl+'</span><span style="font-size:12px;color:#9a8060">/ '+tot+'</span></div><div class="pw"><div class="pi" style="width:'+Math.round(unl/tot*100)+'%"></div></div></div>'+
    '<div style="flex:1"><div class="rl">achievements</div><div style="display:flex;align-items:baseline;gap:6px;margin:3px 0"><span style="font-size:18px;font-weight:bold;color:#AFA9EC">'+achUnl+'</span><span style="font-size:12px;color:#9a8060">/ '+ACHIEVEMENTS.length+'</span></div><div class="pw"><div class="pi" style="width:'+Math.round(achUnl/ACHIEVEMENTS.length*100)+'%;background:#604890"></div></div></div>'+
    '</div><div style="font-size:12px;color:#9a8060;margin-top:6px">'+(tot-unl>0?(tot-unl)+' ending'+(tot-unl>1?"s":"")+" left to find.":"All endings found!")+'</div></div>'+
    '<div class="choices"><button class="btn" onclick="newGame()">Play again</button><button class="btn btn-green" onclick="screen=\'menu\';render()">View journal</button></div>';
}

function render(){
  var el=document.getElementById("main");
  if(screen==="menu"){el.innerHTML=renderMenu();return;}
  if(screen==="ending"){el.innerHTML=renderEnding();return;}
  var r=rm(G.current),ch=buildChoices();
  var isBoss=r.boss&&G.current===G.boss;
  var boss=isBoss?(G.current==="cellar"?BOSSES.cellar:BOSSES.attic):null;
  var noelHere=r.dog==="noel"&&G.dogs.indexOf("noel")<0;
  var rudyHere=r.dog==="rudy"&&G.dogs.indexOf("rudy")<0;
  var danHere=r.person==="dan"&&G.people.indexOf("dan")<0;
  var lilyHere=r.person==="lily"&&G.people.indexOf("lily")<0;
  var bothDogs=G.dogs.indexOf("noel")>=0&&G.dogs.indexOf("rudy")>=0;
  var bothPeople=G.people.indexOf("dan")>=0&&G.people.indexOf("lily")>=0;
  var html='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">'+
    '<span style="font-size:11px;color:#9a8060;text-transform:uppercase;letter-spacing:.06em">manor of dread</span>'+
    '<button class="btn" style="width:auto;padding:4px 12px;font-size:11px" onclick="screen=\'menu\';render()">menu</button></div>'+
    '<div class="dc">'+
    '<div class="rl">current room</div>'+
    '<div style="font-size:15px;font-weight:bold;color:#EF9F27;margin-bottom:4px">'+r.n+'</div>'+
    (isBoss?'<div style="font-size:12px;color:#C04030;margin-bottom:6px;font-weight:bold">- '+boss.n+' is here -</div>':"")+
    (noelHere?'<div class="dogbanner">A golden retriever watches from under the cot tail thumping the floorboards. <span class="wag">~</span></div>':"")+
    (rudyHere?'<div class="dogbanner">A scruffy terrier stands in the shadows growling at something only it can sense. <span class="wag">~</span></div>':"")+
    (danHere?'<div class="danbanner">A man crouches behind the bookshelf wide-eyed and clutching a stack of books.</div>':"")+
    (lilyHere?'<div class="lilybanner">A young woman stands perfectly still in the center of the room eyes closed listening.</div>':"")+
    (bothDogs&&!isBoss?'<div style="font-size:11px;color:#4080C0;margin-bottom:8px">Noel <span class="wag" style="display:inline-block">~</span> and Rudy <span class="wag" style="display:inline-block;animation-delay:.2s">~</span> are with you.</div>':"")+
    (bothPeople&&!isBoss?'<div style="font-size:11px;color:#9a8060;margin-bottom:8px"><span style="color:#20906a">Dan</span> and <span style="color:#C04070">Lily</span> are with you.</div>':"")+
    '<div style="font-size:13px;line-height:1.85;color:#e8d5b0;margin-bottom:8px">'+(isBoss?'<span style="color:#F09595">'+boss.desc+'</span><br><br>':"")+r.desc+'</div>'+
    (G.clue?'<div style="background:#100820;border:1px solid #504890;border-radius:6px;padding:8px 12px;font-size:12px;color:#AFA9EC;font-style:italic">Clue: The circled room on the map - something important is hidden there.</div>':"")+
    '</div>'+
    '<div class="sbar">'+
    '<div class="sb"><div class="sl">health</div><div class="sv">'+Math.round(G.hp)+'%</div><div class="bw"><div class="bf" style="width:'+G.hp+'%;background:'+hpC()+'"></div></div></div>'+
    '<div class="sb"><div class="sl">sanity</div><div class="sv">'+Math.round(G.sanity)+'%</div><div class="bw"><div class="bf" style="width:'+G.sanity+'%;background:'+snC()+'"></div></div></div>'+
    '<div class="sb"><div class="sl">moves</div><div class="sv">'+G.moves+'</div></div>'+
    '<div class="sb"><div class="sl">😼</div><div class="sv" style="color:#ff69b4">'+(SAVE.mewCount||0)+'x</div></div>'+
    '</div>'+
    '<div style="margin-bottom:8px;min-height:22px">';
  if(G.items.length===0){html+='<span style="font-size:11px;color:#3a2810">no items</span>';}
  else{for(var i=0;i<G.items.length;i++){var itm=ITEMS[G.items[i]];html+='<span class="tag '+(itm?itm.t||"":"")+'" title="'+(itm?itm.d||"":"")+'">'+(itm?itm.n:G.items[i])+'</span>';}}
  html+='</div><div class="rl" style="margin-bottom:4px">map <span style="font-size:9px;color:#9a8060">- <span style="color:#4080C0">blue</span>=dog <span style="color:#20906a">green</span>=Dan <span style="color:#C04070">pink</span>=Lily</span></div>'+
    buildMap()+
    '<div class="choices">';
  for(var i=0;i<ch.length;i++){html+='<button class="btn '+(ch[i].c||"")+'" onclick="C('+i+')">'+ch[i].t+'</button>';}
  html+='</div><div class="log">';
  for(var i=0;i<G.log.length;i++){html+='<div class="le '+(G.log[i].cls||"")+'">'+G.log[i].msg+'</div>';}
  html+='</div>';
  el.innerHTML=html;
  window._ch=ch;
}

window.C=function(i){var c=window._ch[i];if(c)c.a();};
genEndings();render();
</script>
</body>
</html>
