<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manor of Dread</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:monospace;background:#1a1208;color:#e8d5b0;min-height:100vh;max-width:600px;margin:0 auto;overflow-x:hidden}
#gameWrap{display:flex;flex-direction:column;min-height:100vh;position:relative}
#fpCanvas{display:none;width:100%;height:220px;background:#000;flex-shrink:0;cursor:pointer}
#fpCanvas.on{display:block}
#textView{flex:1;padding:14px}
#modeBtn{position:fixed;top:10px;right:10px;z-index:700;background:#120e06;border:1px solid #4a3018;border-radius:4px;padding:5px 10px;font-size:10px;color:#9a8060;cursor:pointer;font-family:monospace}
#modeBtn:hover{border-color:#EF9F27;color:#EF9F27}
#musicBtn{position:fixed;bottom:14px;right:14px;z-index:700;background:#120e06;border:1px solid #4a3018;border-radius:50%;width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px}
#musicBtn.playing{border-color:#5DCAA5}
.dc{background:#221808;border:1px solid #4a3018;border-radius:8px;padding:16px;margin-bottom:10px}
.tag{display:inline-block;font-size:11px;padding:2px 8px;border:1px solid #a06020;border-radius:4px;margin:2px;background:#2e1e08;color:#FAC775}
.tag-dog{border-color:#2060a0;background:#081828;color:#85B7EB}
.tag-c{border-color:#306820;background:#101e08;color:#C0DD97}
.tag-k{border-color:#604890;background:#180e28;color:#CECBF6}
.tag-d{border-color:#903020;background:#200a08;color:#F7C1C1}
.tag-dan{border-color:#1a7860;background:#062018;color:#5DCAA5}
.tag-lily{border-color:#904060;background:#200818;color:#ED93B1}
.sbar{display:flex;gap:8px;margin-bottom:12px}
.sb{background:#120e06;border-radius:6px;padding:8px 12px;flex:1;border:1px solid #3a2810}
.sl{font-size:10px;color:#9a8060;text-transform:uppercase;letter-spacing:.05em}
.sv{font-size:15px;font-weight:bold;color:#f0e0c0;margin-top:2px}
.bw{background:#2a1e0a;border-radius:99px;height:5px;margin-top:4px}
.bf{height:5px;border-radius:99px}
.mgrid{display:grid;grid-template-columns:repeat(6,1fr);gap:3px;margin-bottom:12px}
.rc{border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;border:1px solid transparent;aspect-ratio:1;font-family:monospace}
.vis{background:#2a1e08;border-color:#4a3018;color:#9a8060}
.cur{background:#3a2808;border-color:#EF9F27;color:#EF9F27;font-weight:bold}
.unk{background:#180e06;border-color:#2a1e08;color:#2a1e08}
.saf{background:#0e2010;border-color:#1e4820;color:#4a8050}
.dogr{background:#081828;border-color:#2060a0;color:#85B7EB;font-weight:bold}
.danr{background:#062018;border-color:#1a7860;color:#5DCAA5;font-weight:bold}
.lilyr{background:#200818;border-color:#904060;color:#ED93B1;font-weight:bold}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}
.btn{background:#221808;border:1px solid #4a3018;border-radius:6px;padding:9px 10px;font-size:12px;color:#e8d5b0;cursor:pointer;text-align:left;font-family:monospace;line-height:1.4;width:100%}
.btn:hover{border-color:#EF9F27;color:#EF9F27}
.btn-danger{border-color:#6a2018}.btn-danger:hover{border-color:#E24B4A;color:#E24B4A}
.btn-green{border-color:#2a5020}.btn-purple{border-color:#4a3870}
.btn-dog{border-color:#2060a0;color:#85B7EB}.btn-dog:hover{border-color:#85B7EB}
.btn-dan{border-color:#1a7860;color:#5DCAA5}.btn-lily{border-color:#904060;color:#ED93B1}
.btn-prim{border-color:#a06020;color:#EF9F27;display:block;width:100%;padding:12px;margin-bottom:8px;font-size:14px;background:#2e1808}
.log{background:#120e06;border-radius:6px;padding:8px 12px;max-height:80px;overflow-y:auto;margin-top:8px;border:1px solid #3a2810}
.le{font-size:11px;line-height:1.6;color:#9a8060}
.le-bad{color:#C04030}.le-good{color:#4a8030}.le-warn{color:#a07030}
.le-dog{color:#4080C0}.le-dan{color:#20906a}.le-lily{color:#C04070}
.pw{background:#2a1e0a;border-radius:99px;height:7px;margin:6px 0}
.pi{height:7px;border-radius:99px;background:#a06020}
.er{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid #2a1e08}
.er:last-child{border-bottom:none}
.ei{width:26px;height:26px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;background:#2a1e08;border:1px solid #a06020;color:#FAC775}
.ei-lock{background:#180e06;border-color:#2a1e08;color:#2a1e08}
.ei-dog{background:#081828;border-color:#2060a0;color:#85B7EB}
.ei-dan{background:#062018;border-color:#1a7860;color:#5DCAA5}
.ei-lily{background:#200818;border-color:#904060;color:#ED93B1}
.ei-achiev{background:#100820;border-color:#604890;color:#CECBF6}
.ei-achiev-lock{background:#180e06;border-color:#2a1e08;color:#2a1e08}
.en{font-size:12px;font-weight:bold;color:#f0e0c0}
.en-lock{color:#3a2810}
.en-dog{color:#85B7EB}.en-dan{color:#5DCAA5}.en-lily{color:#ED93B1}.en-achiev{color:#CECBF6}
.ed{font-size:11px;color:#9a8060}.ed-lock{color:#2a1e08}
.eb{font-size:10px;padding:2px 7px;border-radius:4px;margin-left:auto;flex-shrink:0;background:#101e08;border:1px solid #306820;color:#C0DD97}
.eb-lock{background:#180e06;border-color:#2a1e08;color:#2a1e08}
.eb-dog{background:#081828;border-color:#2060a0;color:#85B7EB}
.eb-dan{background:#062018;border-color:#1a7860;color:#5DCAA5}
.eb-lily{background:#200818;border-color:#904060;color:#ED93B1}
.eb-achiev{background:#100820;border-color:#604890;color:#CECBF6}
.cfilter{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}

.cf:hover{border-color:#EF9F27;color:#EF9F27}

.jscroll{max-height:320px;overflow-y:auto}
.ecard{border-radius:8px;padding:16px;margin-bottom:10px}
.catb{display:inline-block;font-size:10px;padding:2px 8px;border-radius:4px;margin-bottom:8px}
.dogbanner{background:#081828;border:1px solid #2060a0;border-radius:6px;padding:8px 12px;font-size:12px;color:#85B7EB;margin-bottom:10px;line-height:1.6}
.danbanner{background:#062018;border:1px solid #1a7860;border-radius:6px;padding:8px 12px;font-size:12px;color:#5DCAA5;margin-bottom:10px;line-height:1.6}
.lilybanner{background:#200818;border:1px solid #904060;border-radius:6px;padding:8px 12px;font-size:12px;color:#ED93B1;margin-bottom:10px;line-height:1.6}
.wag{display:inline-block;animation:wag .45s ease-in-out infinite alternate}
@keyframes wag{from{transform:rotate(-18deg)}to{transform:rotate(18deg)}}
.spin{display:inline-block;width:12px;height:12px;border:2px solid #4a3018;border-top-color:#EF9F27;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.rl{font-size:10px;color:#9a8060;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.title{font-size:26px;font-weight:bold;color:#EF9F27;letter-spacing:.04em;text-align:center;margin-bottom:4px;padding-top:8px}
.subtitle{font-size:12px;color:#9a8060;text-align:center;letter-spacing:.06em;margin-bottom:6px}
.castline{font-size:12px;text-align:center;margin-bottom:16px;line-height:2}
.achiev-popup{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:#100820;border:1px solid #604890;border-radius:8px;padding:12px 18px;font-size:12px;color:#CECBF6;z-index:800;max-width:280px;text-align:center;animation:popIn .3s ease;pointer-events:none}
@keyframes popIn{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
#js{display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:9999;background:#000;cursor:pointer;overflow:hidden}
#js.on{display:block}
#jsflash{position:absolute;top:0;left:0;width:100%;height:100%;background:#fff;opacity:0;z-index:1;pointer-events:none}
#jsnoise{position:absolute;top:0;left:0;width:100%;height:100%;opacity:0;z-index:2;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");mix-blend-mode:overlay}
#jsface{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);z-index:4;width:min(90vw,480px);opacity:0;filter:contrast(2) brightness(1.3) saturate(0.2)}
#jsface2{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);z-index:4;width:min(95vw,560px);opacity:0;filter:contrast(2.5) brightness(1.2) saturate(0)}
#jsface3{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);z-index:4;width:min(80vw,380px);opacity:0;filter:contrast(3) brightness(1.5) saturate(0.3)}
#jsword{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:5;font-size:clamp(40px,10vw,88px);font-weight:bold;color:#fff;letter-spacing:.06em;text-align:center;opacity:0;text-shadow:0 0 40px #f00,0 0 80px #f00;pointer-events:none;font-family:monospace;white-space:nowrap}
#jsvig{position:absolute;top:0;left:0;width:100%;height:100%;z-index:6;background:radial-gradient(ellipse at center,transparent 20%,#000 80%);opacity:0;pointer-events:none}
#jseye{position:absolute;top:0;left:50%;transform:translateX(-50%);z-index:7;width:100%;height:0;background:#000;pointer-events:none}
#jstap{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);z-index:8;font-size:11px;color:rgba(255,255,255,0.25);letter-spacing:.1em;opacity:0;pointer-events:none;font-family:monospace}
.drip{position:absolute;top:0;width:3px;background:linear-gradient(#8b0000,#4a0000,transparent);opacity:0;z-index:3;border-radius:0 0 4px 4px;pointer-events:none}
</style>
</head>

<script>
/* ══════════ FIRST PERSON ══════════ */
var fpOn=false,fpAnimId=null,fpTime=0;
var SCENES={
  foyer:{w:"#1a1208",f:"#0e0a06",c:"#100c08",t:2,d:"mirror",fog:0.3},
  hallway:{w:"#150f08",f:"#0c0806",c:"#0e0a06",t:2,d:"portraits",fog:0.45},
  parlor:{w:"#18100a",f:"#0f0907",c:"#120e08",t:1,d:"fireplace",fog:0.25},
  library:{w:"#14100a",f:"#0c0806",c:"#0e0b07",t:1,d:"shelves",fog:0.35},
  study:{w:"#160e08",f:"#0e0a06",c:"#100c08",t:1,d:"desk",fog:0.3},
  kitchen:{w:"#100c08",f:"#0a0806",c:"#0c0a06",t:1,d:"pots",fog:0.5},
  larder:{w:"#0e0c0a",f:"#080806",c:"#0a0a08",t:0,d:"none",fog:0.65},
  dining_room:{w:"#1a1008",f:"#100808",c:"#140e08",t:3,d:"table",fog:0.2},
  ballroom:{w:"#0e0c10",f:"#080810",c:"#0a0a12",t:4,d:"pillars",fog:0.15},
  servants_hall:{w:"#0e0c0a",f:"#080806",c:"#0a0a08",t:1,d:"none",fog:0.6},
  outside_door:{w:"#0a0e08",f:"#060a04",c:"#080c06",t:0,d:"door",fog:0.1},
  nursery:{w:"#120e10",f:"#0c0a0e",c:"#0e0c10",t:1,d:"toys",fog:0.4},
  attic_stair:{w:"#0e0c08",f:"#080804",c:"#0a0a06",t:0,d:"stairs",fog:0.55},
  attic:{w:"#100c0a",f:"#0a0804",c:"#0c0a08",t:1,d:"ritual",fog:0.5},
  cellar_stair:{w:"#0a0c0e",f:"#060808",c:"#080a0c",t:0,d:"stairs",fog:0.7},
  cellar:{w:"#080a0c",f:"#040608",c:"#060808",t:0,d:"chains",fog:0.8},
  secret_passage:{w:"#0a0808",f:"#060404",c:"#080606",t:0,d:"scratches",fog:0.75}
};
function hr(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function drawFP(t,rid){
  var cv=document.getElementById("fpCanvas");
  if(!cv)return;
  var W=cv.width,H=cv.height;
  var ctx=cv.getContext("2d");
  var sc=SCENES[rid]||SCENES.foyer;
  var wr=hr(sc.w),fr=hr(sc.f),cr=hr(sc.c);
  var hor=H*0.48;
  var cg=ctx.createLinearGradient(0,0,0,hor);
  cg.addColorStop(0,"rgb("+cr[0]+","+cr[1]+","+cr[2]+")");
  cg.addColorStop(1,"rgb("+Math.round(cr[0]*.4)+","+Math.round(cr[1]*.4)+","+Math.round(cr[2]*.4)+")");
  ctx.fillStyle=cg;ctx.fillRect(0,0,W,hor);
  var fg=ctx.createLinearGradient(0,hor,0,H);
  fg.addColorStop(0,"rgb("+Math.round(fr[0]*.3)+","+Math.round(fr[1]*.3)+","+Math.round(fr[2]*.3)+")");
  fg.addColorStop(1,"rgb("+fr[0]+","+fr[1]+","+fr[2]+")");
  ctx.fillStyle=fg;ctx.fillRect(0,hor,W,H-hor);
  ctx.strokeStyle="rgba("+fr[0]+","+fr[1]+","+fr[2]+",0.2)";ctx.lineWidth=0.5;
  for(var gx=-5;gx<=5;gx++){var fx=W/2+gx*(W/5);ctx.beginPath();ctx.moveTo(W/2,hor);ctx.lineTo(fx,H);ctx.stroke();}
  for(var gy=0;gy<5;gy++){var fy=hor+(H-hor)*Math.pow(gy/4,1.5);ctx.beginPath();ctx.moveTo(0,fy);ctx.lineTo(W,fy);ctx.stroke();}
  for(var d=6;d>=1;d--){
    var dp=d/6,fade=Math.pow(dp,.6);
    var wx=W*.5*(1-dp*.85),wh=(H-hor)*dp*.9,wy=hor-wh*.5;
    var lr=Math.round(wr[0]*fade*.5),lg=Math.round(wr[1]*fade*.5),lb=Math.round(wr[2]*fade*.5);
    var wg=ctx.createLinearGradient(0,wy,wx,wy);
    wg.addColorStop(0,"rgba("+lr+","+lg+","+lb+",0.9)");
    wg.addColorStop(1,"rgba("+Math.round(lr*.3)+","+Math.round(lg*.3)+","+Math.round(lb*.3)+",0.9)");
    ctx.fillStyle=wg;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(wx,wy);ctx.lineTo(wx,wy+wh);ctx.lineTo(0,H);ctx.closePath();ctx.fill();
    var wg2=ctx.createLinearGradient(W,wy,W-wx,wy);
    wg2.addColorStop(0,"rgba("+lr+","+lg+","+lb+",0.9)");
    wg2.addColorStop(1,"rgba("+Math.round(lr*.3)+","+Math.round(lg*.3)+","+Math.round(lb*.3)+",0.9)");
    ctx.fillStyle=wg2;ctx.beginPath();ctx.moveTo(W,0);ctx.lineTo(W-wx,wy);ctx.lineTo(W-wx,wy+wh);ctx.lineTo(W,H);ctx.closePath();ctx.fill();
  }
  var dw=W*.22,dh=H*.55,dx=(W-dw)/2,dy=hor-dh*.6;
  ctx.fillStyle="#000";ctx.fillRect(dx,dy,dw,dh);
  ctx.beginPath();ctx.arc(dx+dw/2,dy,dw/2,Math.PI,0);ctx.fill();
  var drg=ctx.createRadialGradient(W/2,dy+dh/2,0,W/2,dy+dh/2,dw*.8);
  drg.addColorStop(0,"rgba("+wr[0]+","+Math.round(wr[1]*.6)+",0,0.12)");
  drg.addColorStop(1,"rgba(0,0,0,0)");
  ctx.fillStyle=drg;ctx.fillRect(dx-dw,dy-dh/2,dw*3,dh*2);
  var tp=[];
  if(sc.t>=1)tp.push({x:W*.12,y:hor-H*.15});
  if(sc.t>=2)tp.push({x:W*.88,y:hor-H*.15});
  if(sc.t>=3)tp.push({x:W*.25,y:hor-H*.18});
  if(sc.t>=4)tp.push({x:W*.75,y:hor-H*.18});
  tp.forEach(function(p){
    var fl=.7+.3*Math.sin(t*3.7+p.x)*Math.sin(t*2.1+p.y);
    ctx.fillStyle="#2a1808";ctx.fillRect(p.x-4,p.y-2,8,14);

for(var wi=0;wi<boss.weak.length;wi++){(function(w){if(G.items.indexOf(w)>=0)ch.push({t:"Use "+ITEMS[w].n+" against "+boss.n,c:"btn-purple",a:function(){fightBoss(w);}});})(boss.weak[wi]);}
if(real.length===0&&!hN&&!hR&&!hD&&!hL)ch.push({t:"Fight bare-handed!",c:"btn-danger",a:function(){log("You charge with nothing.","le-bad");endGame("no_items");}});
else ch.push({t:"Fight bare-handed",c:"btn-danger",a:function(){fightBoss(null);}});
ch.push({t:"Run! Back the way you came",c:"",a:function(){moveTo(r.ex[0]);}});}
if(G.items.indexOf("salt")>=0&&!G.saltUsed)ch.push({t:"Pour a salt circle",c:"btn-green",a:function(){var inB=rm(G.current).boss&&G.current===G.boss;G.saltUsed=1;G.sanity=Math.min(100,G.sanity+15);G.items=G.items.filter(function(i){return i!=="salt";});if(inB){endGame("salt_boss");return;}log("You pour a salt circle. The air calms. (+15 sanity)","le-good");render();}});
if(G.items.indexOf("vial")>=0)ch.push({t:"Drink the vial",c:"btn-purple",a:function(){G.items=G.items.filter(function(i){return i!=="vial";});if(Math.random()<.5){G.hp=Math.min(100,G.hp+30);log("The liquid heals you. (+30 HP)","le-good");}else{G.hp=Math.max(0,G.hp-20);log("Poison! (-20 HP)","le-bad");if(G.hp<=0){endGame("poison");return;}}render();}});
if(G.people.indexOf("dan")>=0&&G.items.indexOf("journal")>=0&&!SAVE.unlocked["dan_secret"])ch.push({t:"Show Dan the journal",c:"btn-dan",a:function(){log("Dan goes very quiet. I wrote that he says.","le-dan");endGame("dan_secret");}});

function moveTo(dest){var d=rm(dest);if(!d)return;G.current=dest;G.moves++;var isNew=!G.visited[dest];G.visited[dest]=1;if(isNew){if(d.ev&&d.ev.length)trigEv(d.ev[Math.floor(Math.random()*d.ev.length)]);if(d.dog&&G.dogs.indexOf(d.dog)<0)log("You hear a dog - "+(d.dog==="noel"?"Noel":"Rudy")+" is in this room!","le-dog");if(d.person&&G.people.indexOf(d.person)<0)log("Someone is hiding here - "+(d.person==="dan"?"Dan":"Lily")+"!",d.person==="dan"?"le-dan":"le-lily");maybeJS(function(){chkAch();if(G.hp<=0)endGame("death_hp");else if(G.sanity<=0){log("Your mind shatters.","le-bad");endGame("insanity");}else render();});return;}chkAch();if(G.hp<=0)endGame("death_hp");else if(G.sanity<=0){log("Your mind shatters.","le-bad");endGame("insanity");}else render();}

function fightBoss(weapon){var bk=G.current==="cellar"?"cellar":"attic";var boss=BOSSES[bk];G.moves++;if(weapon&&boss.weak.indexOf(weapon)>=0){G.items=G.items.filter(function(i){return i!==weapon;});log(boss.win,"le-good");showAch("a_first_win");endGame(bk==="cellar"?"slay_beast":"slay_wraith");}else{var atk=boss.atk[Math.floor(Math.random()*boss.atk.length)];if(G.items.indexOf("amulet")>=0&&G.hp-atk.d<=0){G.items=G.items.filter(function(i){return i!=="amulet";});log("The amulet SHATTERS - absorbed a fatal blow!","le-good");G.sanity=Math.max(0,G.sanity-10);log(atk.t,"le-bad");if(G.sanity<=0){endGame("insanity");return;}endGame("amulet_used");return;}G.hp=Math.max(0,G.hp-atk.d);G.sanity=Math.max(0,G.sanity-10);log(atk.t,"le-bad");if(G.hp<=0){log(boss.lose,"le-bad");endGame("death_hp");}else if(G.sanity<=0){log("Your mind breaks.","le-bad");endGame("insanity");}else render();}}

function endGame(raw){var fid=SKIP[raw]?raw:(chkSpec(raw)||raw);G.end=fid;SAVE.unlocked[fid]=1;save();chkAch();screen="ending";render();}

function bldMap(){var h='<div class="mgrid">';for(var i=0;i<ROOMS.length;i++){var r=ROOMS[i],v=G.visited[r.id],cur=G.current===r.id;var dH=r.dog&&v&&G.dogs.indexOf(r.dog)<0;var dnH=r.person==="dan"&&v&&G.people.indexOf("dan")<0;var lH=r.person==="lily"&&v&&G.people.indexOf("lily")<0;var cls=cur?"cur":dnH?"danr":lH?"lilyr":dH?"dogr":v?"vis":r.safe?"saf":"unk";var tip=cur?r.n:v?r.n+(dH?" - dog!":dnH?" - Dan!":lH?" - Lily!":""):"???";h+='<div class="rc '+cls+'" title="'+tip+'">'+(cur?"[*]":r.ic)+'</div>';}return h+'</div>';}

function catRow(e){var got=SAVE.unlocked[e.id];var isDog=e.cat==="dog",isDan=e.cat==="dan",isLily=e.cat==="lily";var isSec=e.cat==="secret"&&!got;var eiC=got?(isDog?"ei ei-dog":isDan?"ei ei-dan":isLily?"ei ei-lily":"ei"):"ei ei-lock";var enC=got?(isDog?"en en-dog":isDan?"en en-dan":isLily?"en en-lily":"en"):"en en-lock";var ebC=got?(isDog?"eb eb-dog":isDan?"eb eb-dan":isLily?"eb eb-lily":"eb"):"eb eb-lock";return'<div class="er"><div class="'+eiC+'">'+(got?e.i:"?")+'</div><div style="flex:1;min-width:0"><div class="'+enC+'">'+(isSec?"???":e.l)+'</div><div class="'+(got?"ed":"ed ed-lock")+'">'+(got?e.cond:isSec?"Keep exploring...":e.cond)+'</div></div><span class="'+ebC+'">'+(got?"found":"locked")+'</span></div>';}

function renderMenu(){var tot=ALL.length,unl=Object.keys(SAVE.unlocked).length,rem=tot-unl,pct=Math.round(unl/tot*100);var aUnl=Object.keys(SAVE.ach).length,aTot=ACH.length;var cc={};for(var i=0;i<ALL.length;i++){cc[ALL[i].cat]=(cc[ALL[i].cat]||0)+1;}var filt=jf==="achievements"?null:jf==="all"?ALL:ALL.filter(function(e){return e.cat===jf;});var fh='<div class="cfilter"><div class="cf '+(jf==="all"?"cf-active":"")+'" onclick="jf=\'all\';render()">All ('+tot+')</div>';for(var i=0;i<CATS.length;i++){var c=CATS[i];fh+='<div class="cf '+(jf===c.id?"cf-active":"")+'" onclick="jf=\''+c.id+'\';render()">'+c.l+(cc[c.id]?" ("+cc[c.id]+")":"")+'</div>';}fh+='<div class="cf '+(jf==="achievements"?"cf-active":"")+'" onclick="jf=\'achievements\';render()">Achievements ('+aTot+')</div></div>';var rows="";if(jf==="achievements"){for(var i=0;i<ACH.length;i++){var a=ACH[i],got=SAVE.ach[a.id],hidden=a.secret&&!got;rows+='<div class="er"><div class="'+(got?"ei ei-achiev":"ei ei-achiev-lock")+'">'+(got?a.icon:"?")+'</div><div style="flex:1;min-width:0"><div class="'+(got?"en en-achiev":"en en-lock")+'">'+(hidden?"???":a.l)+'</div><div class="'+(got?"ed":"ed ed-lock")+'">'+(hidden?"Keep exploring...":a.desc)+'</div></div><span class="'+(got?"eb eb-achiev":"eb eb-lock")+'">'+(got?"unlocked":"locked")+'</span></div>';}}else{for(var i=0;i<(filt||[]).length;i++){rows+=catRow(filt[i]);}}
return'<div class="title">Manor of Dread</div><div class="subtitle">a haunted survival game &mdash; '+tot+' endings</div><div class="castline"><span style="color:#4080C0">Noel <span class="wag">~</span> &nbsp; Rudy <span class="wag" style="animation-delay:.2s">~</span></span>&nbsp;&nbsp;&nbsp;<span style="color:#20906a">Dan</span>&nbsp;&nbsp;<span style="color:#C04070">Lily</span></div><button class="btn btn-prim" onclick="newGame()">Enter the manor</button>'+(SAVE.runs>0?'<p style="font-size:11px;color:#9a8060;margin-bottom:10px">total runs: '+SAVE.runs+'</p>':'')+'<div class="dc"><div style="display:flex;gap:12px"><div style="flex:1"><div class="rl">endings</div><div style="display:flex;align-items:baseline;gap:6px;margin:4px 0 2px"><span style="font-size:20px;font-weight:bold;color:#EF9F27">'+unl+'</span><span style="font-size:12px;color:#9a8060">/ '+tot+'</span></div><div class="pw"><div class="pi" style="width:'+pct+'%"></div></div></div><div style="flex:1"><div class="rl">achievements</div><div style="display:flex;align-items:baseline;gap:6px;margin:4px 0 2px"><span style="font-size:20px;font-weight:bold;color:#AFA9EC">'+aUnl+'</span><span style="font-size:12px;color:#9a8060">/ '+aTot+'</span></div><div class="pw"><div class="pi" style="width:'+Math.round(aUnl/aTot*100)+'%;background:#604890"></div></div></div></div><div style="font-size:12px;color:#9a8060;margin-top:8px">'+(rem>0?rem+' ending'+(rem>1?"s":"")+" still to find.":"All endings found. The manor has no more secrets.")+'</div></div><div class="dc"><div class="rl" style="margin-bottom:8px">journal &amp; achievements</div>'+(!ready?'<div style="font-size:13px;color:#9a8060;padding:8px 0"><span class="spin"></span>Generating more endings from the dark...</div>':fh)+'<div class="jscroll">'+rows+'</div></div>';}

function renderEnding(){var e=null;for(var i=0;i<ALL.length;i++){if(ALL[i].id===G.end){e=ALL[i];break;}}if(!e){screen="menu";render();return;}var cat=catS(e.cat),tot=ALL.length,unl=Object.keys(SAVE.unlocked).length,aUnl=Object.keys(SAVE.ach).length;var surv=[];if(G.people.indexOf("dan")>=0)surv.push("Dan made it out.");if(G.people.indexOf("lily")>=0)surv.push("Lily made it out.");if(G.dogs.indexOf("noel")>=0)surv.push("Noel made it out. Good boy.");if(G.dogs.indexOf("rudy")>=0)surv.push("Rudy made it out. Absolute unit.");return'<div class="ecard" style="background:'+cat.bg+';border:1px solid '+cat.b+'"><span class="catb" style="background:'+cat.bg+';border:1px solid '+cat.b+';color:'+cat.c+'">'+cat.l+'</span><div style="font-size:18px;font-weight:bold;color:'+cat.c+';margin-bottom:8px">'+e.l+'</div><div style="font-size:13px;line-height:1.9;color:#e8d5b0">'+e.desc+'</div>'+(surv.length?'<div style="margin-top:10px;font-size:12px;color:#9a8060;line-height:1.8">'+surv.join("<br>")+'</div>':'')+'<div style="margin-top:12px;display:flex;gap:16px;flex-wrap:wrap"><div><div class="sl">health</div><div style="font-size:15px;font-weight:bold;color:#f0e0c0">'+Math.round(G.hp)+'%</div></div><div><div class="sl">sanity</div><div style="font-size:15px;font-weight:bold;color:#f0e0c0">'+Math.round(G.sanity)+'%</div></div><div><div class="sl">moves</div><div style="font-size:15px;font-weight:bold;color:#f0e0c0">'+G.moves+'</div></div></div></div><div class="dc"><div style="display:flex;gap:12px"><div style="flex:1"><div class="rl">endings</div><div style="display:flex;align-items:baseline;gap:6px;margin:3px 0"><span style="font-size:18px;font-weight:bold;color:#EF9F27">'+unl+'</span><span style="font-size:12px;color:#9a8060">/ '+tot+'</span></div><div class="pw"><div class="pi" style="width:'+Math.round(unl/tot*100)+'%"></div></div></div><div style="flex:1"><div class="rl">achievements</div><div style="display:flex;align-items:baseline;gap:6px;margin:3px 0"><span style="font-size:18px;font-weight:bold;color:#AFA9EC">'+aUnl+'</span><span style="font-size:12px;color:#9a8060">/ '+ACH.length+'</span></div><div class="pw"><div class="pi" style="width:'+Math.round(aUnl/ACH.length*100)+'%;background:#604890"></div></div></div></div><div style="font-size:12px;color:#9a8060;margin-top:6px">'+(tot-unl>0?(tot-unl)+' ending'+(tot-unl>1?"s":"")+" left to find.":"All endings found!")+'</div></div><div class="choices"><button class="btn" onclick="newGame()">Play again</button><button class="btn btn-green" onclick="screen=\'menu\';render()">View journal</button></div>';}

function render(){var el=document.getElementById("main");if(screen==="menu"){el.innerHTML=renderMenu();return;}if(screen==="ending"){el.innerHTML=renderEnding();return;}var r=rm(G.current),ch=bldCh();var isBoss=r.boss&&G.current===G.boss;var boss=isBoss?(G.current==="cellar"?BOSSES.cellar:BOSSES.attic):null;var nH=r.dog==="noel"&&G.dogs.indexOf("noel")<0;var rH=r.dog==="rudy"&&G.dogs.indexOf("rudy")<0;var dH=r.person==="dan"&&G.people.indexOf("dan")<0;var lH=r.person==="lily"&&G.people.indexOf("lily")<0;var bD=G.dogs.indexOf("noel")>=0&&G.dogs.indexOf("rudy")>=0;var bP=G.people.indexOf("dan")>=0&&G.people.indexOf("lily")>=0;
var h='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px"><span style="font-size:11px;color:#9a8060;text-transform:uppercase;letter-spacing:.06em">manor of dread</span><button class="btn" style="width:auto;padding:4px 12px;font-size:11px" onclick="screen=\'menu\';render()">menu</button></div><div class="dc"><div class="rl">current room</div><div style="font-size:15px;font-weight:bold;color:#EF9F27;margin-bottom:4px">'+r.n+'</div>'+(isBoss?'<div style="font-size:12px;color:#C04030;margin-bottom:6px;font-weight:bold">- '+boss.n+' is here -</div>':'')+(nH?'<div class="dogbanner">A golden retriever watches from under the cot tail thumping the floorboards. <span class="wag">~</span></div>':'')+(rH?'<div class="dogbanner">A scruffy terrier stands in the shadows growling at something only it can sense. <span class="wag">~</span></div>':'')+(dH?'<div class="danbanner">A man crouches behind the bookshelf wide-eyed and clutching a stack of books.</div>':'')+(lH?'<div class="lilybanner">A young woman stands perfectly still in the center of the room eyes closed listening.</div>':'')+(bD&&!isBoss?'<div style="font-size:11px;color:#4080C0;margin-bottom:8px">Noel <span class="wag" style="display:inline-block">~</span> and Rudy <span class="wag" style="display:inline-block;animation-delay:.2s">~</span> are with you.</div>':'')+(bP&&!isBoss?'<div style="font-size:11px;color:#9a8060;margin-bottom:8px"><span style="color:#20906a">Dan</span> and <span style="color:#C04070">Lily</span> are with you.</div>':'')+'<div style="font-size:13px;line-height:1.85;color:#e8d5b0;margin-bottom:8px">'+(isBoss?'<span style="color:#F09595">'+boss.desc+'</span><br><br>':"")+r.desc+'</div>'+(G.clue?'<div style="background:#100820;border:1px solid #504890;border-radius:6px;padding:8px 12px;font-size:12px;color:#AFA9EC;font-style:italic">Clue: The circled room on the map - something important is hidden there.</div>':'')+'</div><div class="sbar"><div class="sb"><div class="sl">health</div><div class="sv">'+Math.round(G.hp)+'%</div><div class="bw"><div class="bf" style="width:'+G.hp+'%;background:'+hpC()+'"></div></div></div><div class="sb"><div class="sl">sanity</div><div class="sv">'+Math.round(G.sanity)+'%</div><div class="bw"><div class="bf" style="width:'+G.sanity+'%;background:'+snC()+'"></div></div></div><div class="sb"><div class="sl">moves</div><div class="sv">'+G.moves+'</div></div></div><div style="margin-bottom:8px;min-height:22px">';
if(G.items.length===0){h+='<span style="font-size:11px;color:#3a2810">no items</span>';}else{for(var i=0;i<G.items.length;i++){var itm=ITEMS[G.items[i]];h+='<span class="tag '+(itm?itm.t||"":"")+'" title="'+(itm?itm.d||"":"")+'">'+(itm?itm.n:G.items[i])+'</span>';}}
h+='</div><div class="rl" style="margin-bottom:4px">map <span style="font-size:9px;color:#9a8060">- <span style="color:#4080C0">blue</span>=dog <span style="color:#20906a">green</span>=Dan <span style="color:#C04070">pink</span>=Lily</span></div>'+bldMap()+'<div class="choices">';
for(var i=0;i<ch.length;i++){h+='<button class="btn '+(ch[i].c||"")+'" onclick="C('+i+')">'+ch[i].t+'</button>';}
h+='</div><div class="log">';for(var i=0;i<G.log.length;i++){h+='<div class="le '+(G.log[i].c||"")+'">'+G.log[i].m+'</div>';}h+='</div>';
el.innerHTML=h;window._ch=ch;}
