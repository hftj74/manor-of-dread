.spin{display:inline-block;width:12px;height:12px;border:2px solid #4a3018;border-top-color:#EF9F27;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}

#js{display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:9999;background:#000;cursor:pointer;overflow:hidden}
#js.on{display:block}
#jsflash{position:absolute;top:0;left:0;width:100%;height:100%;background:#fff;opacity:0;z-index:1;pointer-events:none}
#jsnoise{position:absolute;top:0;left:0;width:100%;height:100%;opacity:0;z-index:2;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");mix-blend-mode:overlay}
#jsface{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);z-index:4;width:min(90vw,480px);opacity:0;filter:contrast(2) brightness(1.3) saturate(0.2)}

#jsword{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:5;font-size:clamp(40px,10vw,88px);font-weight:bold;color:#fff;letter-spacing:.06em;text-align:center;opacity:0;text-shadow:0 0 40px #f00,0 0 80px #f00;pointer-events:none;font-family:monospace;white-space:nowrap}
#jsvig{position:absolute;top:0;left:0;width:100%;height:100%;z-index:6;background:radial-gradient(ellipse at center,transparent 20%,#000 80%);opacity:0;pointer-events:none}
#jseye{position:absolute;top:0;left:50%;transform:translateX(-50%);z-index:7;width:100%;height:0;background:#000;pointer-events:none}
#jstap{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);z-index:8;font-size:11px;color:rgba(255,255,255,0.25);letter-spacing:.1em;opacity:0;pointer-events:none;font-family:monospace}
.drip{position:absolute;top:0;width:3px;background:linear-gradient(#8b0000,#4a0000,transparent);opacity:0;z-index:3;border-radius:0 0 4px 4px;pointer-events:none}
</style>

<script>
var jsOn=false,jsTimers=[],jsCb=null;
var SCARES=[

function ct(){jsTimers.forEach(clearTimeout);jsTimers=[];}
function tt(fn,ms){jsTimers.push(setTimeout(fn,ms));}
function shakeLoop(){if(!jsOn)return;var el=document.getElementById("js");var x=(Math.random()-.5)*28,y=(Math.random()-.5)*28,r=(Math.random()-.5)*7;el.style.transform="translate("+x+"px,"+y+"px) rotate("+r+"deg)";tt(shakeLoop,55);}

function triggerScare(callback){
  if(jsOn){if(callback)callback();return;}
  var s=SCARES[Math.floor(Math.random()*SCARES.length)];
  jsOn=true;jsCb=callback||null;
  var js=document.getElementById("js"),flash=document.getElementById("jsflash"),noise=document.getElementById("jsnoise"),word=document.getElementById("jsword"),vig=document.getElementById("jsvig"),tap=document.getElementById("jstap"),eye=document.getElementById("jseye");
  ["jsface","jsface2","jsface3"].forEach(function(id){var f=document.getElementById(id);f.style.display="none";f.style.opacity="0";f.style.transform="translate(-50%,-50%) scale(0)";});
  var face=document.getElementById(s.face);face.style.display="block";
  word.textContent=s.word;word.style.opacity="0";flash.style.opacity="0";vig.style.opacity="0";tap.style.opacity="0";noise.style.opacity="0";eye.style.height="0";js.style.transform="none";js.classList.add("on");
  tt(function(){flash.style.background=s.flash;flash.style.transition="opacity 0.04s";flash.style.opacity="1";},0);
  tt(function(){flash.style.transition="opacity 0.12s";flash.style.opacity="0";face.style.transition="transform 0.07s cubic-bezier(0.1,2,0.3,1), opacity 0.07s";face.style.transform="translate(-50%,-50%) scale(1.12)";face.style.opacity="1";noise.style.transition="opacity 0.1s";noise.style.opacity="0.35";shakeLoop();spawnDrips();},55);
  tt(function(){face.style.transition="transform 0.18s ease-out";face.style.transform="translate(-50%,-50%) scale(1)";word.style.transition="opacity 0.08s";word.style.opacity="1";vig.style.transition="opacity 0.25s";vig.style.opacity="1";},180);
  tt(function(){flash.style.background="#ff0000";flash.style.transition="opacity 0.04s";flash.style.opacity="0.5";tt(function(){flash.style.transition="opacity 0.1s";flash.style.opacity="0";},70);},650);
